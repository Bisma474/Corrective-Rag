version: '3.9'

services:
  crag:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crag-platform
    ports:
      - "8000:8000"
    volumes:
      # Persist the SQLite database and vector index outside the container
      - crag_data:/app/storage
      - crag_db:/app/database.db
    environment:
      - JWT_SECRET=${JWT_SECRET:-super-secret-crag-jwt-key-change-in-production}
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  crag_data:
  crag_db:
